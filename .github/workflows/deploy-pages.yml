# Deploy docs folder to GitHub Pages (ensures subfolders like 05-css-portfolio-grid work)
# Runs AFTER Sync Portfolio to Docs so the live site always gets the latest Tutorials → docs content.
name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["Sync Portfolio to Docs"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact (docs folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
