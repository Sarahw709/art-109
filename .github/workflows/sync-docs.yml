name: Sync Portfolio to Docs

on:
  workflow_dispatch:  # Run manually from Actions tab to force sync
  push:
    branches:
      - main
    # No path filter: run on every push so Tutorials → docs sync always happens and live site updates

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync files to docs folder
        run: |
          # Sync 07 as the root of the site (docs/)
          rm -rf docs/css docs/images docs/js docs/projects docs/resume
          rm -f docs/index.html
          cp -r Tutorials/07-css-portfolio-grid-multiple-pages/* docs/
          touch docs/.nojekyll
          # Sync 04-css-transitions (subfolder)
          rm -rf docs/04-css-transitions
          cp -r Tutorials/04-css-transitions docs/
          # Sync 05-css-portfolio-grid (subfolder)
          rm -rf docs/05-css-portfolio-grid
          cp -r Tutorials/05-css-portfolio-grid docs/
          mkdir -p docs/05-css-portfolio-grid/images
          cp docs/images/*.jpg docs/05-css-portfolio-grid/images/ 2>/dev/null || true
          # Sync 06-dom (subfolder)
          rm -rf docs/06-dom
          cp -r Tutorials/06-dom docs/
          # Sync 07-css-portfolio-grid-multiple-pages (subfolder)
          # (07 is already copied to docs/ root above)
          # Sync 08-css-portfolio-grid-lightbox (subfolder)
          rm -rf docs/08-css-portfolio-grid-lightbox
          cp -r Tutorials/08-css-portfolio-grid-lightbox docs/
          # Sync 09-portfolio-p5 (subfolder)
          rm -rf docs/09-portfolio-p5
          cp -r Tutorials/09-portfolio-p5 docs/
          # Sync 10-net-art (subfolder)
          rm -rf docs/10-net-art
          cp -r Tutorials/10-net-art docs/
          # Sync 11-copilot-demo (subfolder)
          rm -rf docs/11-copilot-demo
          cp -r Tutorials/11-copilot-demo docs/
          # 12-node-drawing-app: static files only (GitHub Pages cannot run Node/Express)
          rm -rf docs/12-node-drawing-app
          mkdir -p docs/12-node-drawing-app
          cp -r Tutorials/12-node-drawing-app/public/* docs/12-node-drawing-app/
          rm -f docs/12-node-drawing-app/server.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          if ! git diff --staged --quiet; then
            git commit -m "Auto-sync portfolio files to docs folder"
            git push
          else
            echo "No changes to commit"
          fi
